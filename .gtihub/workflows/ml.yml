name: ML Prediction Pipeline

on:
  push:
    branches: ["main"]

jobs:
  run-ml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ML Pipeline
        run: |
          python main.py
